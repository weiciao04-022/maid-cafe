<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>揭開夢幻背後的真相 - 融媒體專案互動</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&display=swap');

        :root {
            --maid-pink: #fdf2f8;
            --maid-dark-pink: #db2777;
            --evidence-red: #ff3333;
        }

        body {
            background-color: #080808;
            color: #e5e7eb;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        /* 探照燈遮罩 - z-index: 100 */
        #spotlight-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            background: black;
            z-index: 100;
            -webkit-mask-image: radial-gradient(circle 180px at var(--x, 50%) var(--y, 50%), transparent 15%, black 85%);
            mask-image: radial-gradient(circle 180px at var(--x, 50%) var(--y, 50%), transparent 15%, black 85%);
            opacity: 0;
            transition: opacity 1s ease;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 角色容器 */
        .character-container {
            position: relative;
            height: 85vh;
            width: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #maid-image {
            height: 100%;
            width: auto;
            object-fit: contain;
            display: block;
            filter: brightness(0.8);
        }

        .tremble {
            animation: tremble 0.15s infinite;
        }

        @keyframes tremble {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1.5px, -1px); }
            100% { transform: translate(1px, 1px); }
        }

        /* 真相證物組件 */
        .evidence-scene {
            position: absolute;
            z-index: 20; /* 初始在燈光下 */
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.8s ease, transform 0.8s ease, z-index 0s;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 解鎖後的永久亮起狀態 - z-index 提升至 150 跳過遮罩 */
        .evidence-scene.revealed {
            opacity: 1 !important;
            transform: scale(1);
            z-index: 150 !important;
            pointer-events: auto;
        }

        /* 證物視覺樣式 */
        .evidence-card {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid var(--evidence-red);
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            animation: pulse-red 2s infinite ease-in-out;
            max-width: 280px;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); border-color: rgba(255, 0, 0, 0.5); }
            50% { box-shadow: 0 0 35px rgba(255, 0, 0, 0.6); border-color: rgba(255, 0, 0, 1); }
            100% { box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); border-color: rgba(255, 0, 0, 0.5); }
        }

        .evidence-img {
            width: 120px;
            height: auto;
            margin-bottom: 0.75rem;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
        }

        /* 互動熱區 */
        .touch-zone {
            position: absolute;
            cursor: help;
            z-index: 110;
        }
        
        /* 擴大後的感應範圍 */
        .zone-shoulder { top: 10%; left: 15%; width: 70%; height: 25%; }
        .zone-hand { top: 35%; left: 25%; width: 50%; height: 25%; }
        .zone-hip { top: 60%; left: 10%; width: 80%; height: 35%; }

        /* 文字私語 */
        .whisper-text {
            position: absolute;
            color: #f472b6;
            font-weight: bold;
            z-index: 160;
            pointer-events: none;
            animation: whisperAnim 2.5s forwards ease-out;
            text-shadow: 0 0 10px black;
            font-size: 1.1rem;
        }

        @keyframes whisperAnim {
            0% { transform: scale(0.8); opacity: 0; }
            20% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1) translateY(-30px); opacity: 0; }
        }

        #start-screen {
            background: white;
            z-index: 400;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
            text-align: center;
            color: #1a1a1a;
            border-radius: 24px;
        }

        .action-btn {
            background: var(--maid-dark-pink);
            color: white;
            padding: 1rem 3rem;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(219, 39, 119, 0.3);
        }

        #hint-text {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            background: rgba(0,0,0,0.8);
            padding: 12px 30px;
            border-radius: 40px;
            color: #fbcfe8;
            opacity: 0;
            transition: opacity 0.5s;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div id="spotlight-mask"></div>

<!-- 啟動介面 -->
<div id="start-screen" class="fixed inset-0 m-auto w-fit h-fit">
    <div class="max-w-md">
        <h1 class="text-3xl font-bold mb-6 text-pink-600">揭開夢幻背後的暗影</h1>
        <p class="text-gray-600 mb-8 leading-relaxed">
            身為調查者，請點擊開始。<br>
            移動您的目光（探照燈）審視女僕，發掘隱藏的真相。
        </p>
        <button class="action-btn" onclick="startInvestigating()">開始蒐證調查</button>
    </div>
</div>

<div id="hint-text">持續搜尋疑點：肩膀、手部、裙擺</div>

<div id="game-container">
    <div class="character-container" id="character">
        
        <!-- 💡 角色本體圖片 -->
        <img id="maid-image" src="C:\Users\AqUa0\Downloads\下載.png" alt="女僕角色">

        <!-- 1. 肩膀真相：紅色手掌 -->
        <div class="evidence-scene" style="top: 15%; left: 15%;" id="ev-shoulder">
            <div class="evidence-card">
                <!-- 💡 此處更換為你的圖片路徑 -->
                <svg class="evidence-img" viewBox="0 0 24 24" fill="none" stroke="red" stroke-width="1.5">
                    <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0M14 10V4a2 2 0 0 0-2-2M10 10.5V6M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2" />
                    <path d="M12 15 L7 15" stroke="red" />
                </svg>
                <p class="text-red-500 font-bold text-lg text-center">不適的搭肩</p>
                <p class="text-gray-400 text-[10px] mt-1 text-center">來自上級的「職場關心」</p>
            </div>
        </div>
        
        <!-- 2. 手部真相：手機訊息 -->
        <div class="evidence-scene" style="top: 40%; left: 52%;" id="ev-hand">
            <div class="evidence-card" style="border-color: #db2777;">
                <!-- 💡 此處更換為你的圖片路徑 -->
                <svg class="evidence-icon evidence-img" style="width: 60px; margin: 0 auto 10px;" viewBox="0 0 24 24" fill="none" stroke="#db2777" stroke-width="2">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                    <path d="M12 18h.01" />
                </svg>
                <p class="text-pink-400 text-xs font-bold mb-2">來自未知的私訊：</p>
                <p class="text-pink-100 text-sm leading-relaxed italic">「笑容是買下的，不准收起來。」</p>
            </div>
        </div>

        <!-- 3. 裙擺真相：窺視眼球 -->
        <div class="evidence-scene" style="bottom: 18%; left: 35%;" id="ev-hip">
            <div class="evidence-card">
                <!-- 💡 此處更換為你的圖片路徑 -->
                <svg class="evidence-img" style="width: 80px; margin: 0 auto 10px;" viewBox="0 0 24 24" fill="none" stroke="#db2777" stroke-width="2">
                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                    <circle cx="12" cy="12" r="3" fill="red" />
                </svg>
                <p class="text-pink-500 font-bold text-lg text-center">偷拍與監視</p>
                <p class="text-gray-400 text-[10px] mt-1 text-center">被忽視的個人隱私邊界</p>
            </div>
        </div>

        <!-- 互動熱區 -->
        <div class="touch-zone zone-shoulder" onmouseenter="examineMaid('shoulder')" onmouseleave="stopExamine()"></div>
        <div class="touch-zone zone-hand" onmouseenter="examineMaid('hand')" onmouseleave="stopExamine()"></div>
        <div class="touch-zone zone-hip" onmouseenter="examineMaid('hip')" onmouseleave="stopExamine()"></div>
    </div>
</div>

<!-- 結論層 -->
<div id="conclusion" class="fixed inset-0 bg-black/95 z-[500] hidden items-center justify-center p-8 text-center text-white">
    <div class="max-w-xl">
        <h2 class="text-3xl font-bold text-pink-500 mb-6">調查報告：隱形的壓迫</h2>
        <p class="text-gray-300 mb-10 text-lg leading-relaxed">
            這不是偶發的惡作劇。當「主僕」的遊戲設定延伸至現實，勞動者的隱私與身體自主權往往成為被犧牲的代價。
        </p>
        <p class="text-zinc-500 text-sm italic">請繼續向下閱讀報導全文</p>
    </div>
</div>

<script>
    let audioCtx, oscillator, gainNode;
    let examinationProgress = { shoulder: 0, hand: 0, hip: 0 };
    let isExaming = false;
    let currentPart = '';
    let found = { shoulder: false, hand: false, hip: false };

    const whispers = {
        shoulder: ["「肩膀怎麼在抖呢？」", "「聽話才有班排喔...」"],
        hand: ["「笑容是我買下的。」", "「不准不回訊息。」"],
        hip: ["「拍一下又不會怎樣。」", "「我會一直盯著妳。」"]
    };

    function startInvestigating() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('spotlight-mask').style.opacity = '1';
        document.getElementById('hint-text').style.opacity = '1';
        initAudio();
    }

    window.addEventListener('mousemove', e => {
        document.documentElement.style.setProperty('--x', e.clientX + 'px');
        document.documentElement.style.setProperty('--y', e.clientY + 'px');
    });

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            oscillator = audioCtx.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(45, audioCtx.currentTime); 
            oscillator.connect(gainNode);
            oscillator.start();
        }
    }

    function examineMaid(part) {
        if (found[part]) return;
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        
        isExaming = true;
        currentPart = part;
        document.getElementById('character').classList.add('tremble');
        gainNode.gain.setTargetAtTime(0.3, audioCtx.currentTime, 0.2);
        
        const interval = setInterval(() => {
            if (!isExaming || currentPart !== part || found[part]) {
                clearInterval(interval);
                return;
            }
            // 判定速度調整 (約 3.5 秒解鎖)
            examinationProgress[part] += 1.4;
            
            // 只有在進度 50% 時跳出文字
            if (Math.floor(examinationProgress[part]) === 50) {
                showWhisper(whispers[part][Math.floor(Math.random() * whispers[part].length)]);
            }

            if (examinationProgress[part] >= 100) {
                revealEvidence(part);
                clearInterval(interval);
            }
        }, 50);
    }

    function stopExamine() {
        isExaming = false;
        currentPart = '';
        document.getElementById('character').classList.remove('tremble');
        if (gainNode) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
    }

    function revealEvidence(part) {
        found[part] = true;
        const ev = document.getElementById(`ev-${part}`);
        if (ev) {
            ev.classList.add('revealed');
        }
        
        if (Object.values(found).every(v => v)) {
            document.getElementById('hint-text').innerText = "真相已顯現。";
            setTimeout(() => {
                document.getElementById('conclusion').classList.remove('hidden');
                document.getElementById('conclusion').style.display = 'flex';
            }, 3000);
        }
    }

    function showWhisper(text) {
        const div = document.createElement('div');
        div.className = 'whisper-text';
        div.innerText = text;
        div.style.left = `${Math.random() * 40 + 30}%`;
        div.style.top = `${Math.random() * 20 + 40}%`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
    }
</script>

</body>
</html>
