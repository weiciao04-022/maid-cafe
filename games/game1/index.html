<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maiden Border: The Guard's Manual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;900&family=Zen+Maru+Gothic:wght@700;900&family=Kiwi+Maru:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --maid-pink: #ff85a2;
            --cream-white: #fffcf2;
        }

        body {
            font-family: 'Kiwi Maru', 'Noto Sans TC', sans-serif;
            background: #fff5f7;
            background-image: radial-gradient(#ffdae0 2px, transparent 2px);
            background-size: 30px 30px;
            min-height: 100vh;
            margin: 0;
        }

        .title-font { font-family: 'Zen Maru Gothic', sans-serif; }

        /* 規則卡片 */
        .rule-card {
            background: white;
            border: 4px solid #ffb3c1;
            border-radius: 1.5rem;
            transition: all 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .rule-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 133, 162, 0.2);
        }

        .rule-img-container {
            width: 100%;
            height: 160px;
            background: #ffeef2;
            border-bottom: 2px dashed #ffb3c1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .rule-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 遊戲 UI */
        .maid-card {
            background: white;
            border: 8px double #ff85a2;
            border-radius: 2.5rem;
            box-shadow: 0 15px 0 #ffb3c1;
        }

        .speech-bubble {
            background: #fff0f3;
            border-radius: 2rem;
            border: 3px solid #ffdae0;
            position: relative;
        }

        .option-btn {
            background: white;
            border: 2px solid #ffb3c1;
            border-radius: 1rem;
            padding: 1rem;
            text-align: left;
            transition: all 0.2s;
            color: #ff4d6d;
            font-weight: bold;
            width: 100%;
        }
        .option-btn:hover {
            background: #fff0f3;
            transform: translateX(5px);
        }

        .moe-bar-container {
            background: #ffeef2;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }
        .moe-bar-fill {
            background: #ff85a2;
            height: 100%;
            transition: width 0.5s ease;
        }

        .rule-note {
            background: #fff9fa;
            border: 1px solid #ffdae0;
            border-radius: 1rem;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- 1. 標題畫面 -->
    <div id="start-screen" class="min-h-screen flex flex-col items-center justify-center text-center px-6 fade-in">
        <div class="text-9xl mb-4 animate-bounce">🎀</div>
        <h1 class="title-font text-6xl font-black text-pink-500 mb-2 tracking-tighter">夢幻邊界</h1>
        <p class="text-pink-300 font-bold mb-10 text-xl">～守護女僕計畫～</p>
        <button onclick="showRules()" class="bg-pink-500 hover:bg-pink-600 text-white px-12 py-5 rounded-full font-black text-2xl shadow-[0_8px_0_#d14d6b] transition-all active:translate-y-1">
            進入執勤準備
        </button>
    </div>

    <!-- 2. 規則宣導畫面 -->
    <div id="rules-screen" class="hidden min-h-screen py-12 px-6 fade-in">
        <div class="max-w-5xl mx-auto">
            <h2 class="title-font text-4xl font-black text-pink-500 mb-8 text-center">📜 守護者準則 (行前宣導)</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                <!-- 規則 1 -->
                <div class="rule-card">
                    <div class="rule-img-container">
                        <img src="https://raw.githubusercontent.com/shuang0414/-/2f348d84ab1a7bba922ac132de328634e628fb81/Gemini_Generated_Image_9tb8xc9tb8xc9tb8.png" alt="尊重隱私">
                        <div class="absolute bottom-2 right-2 bg-white/80 px-2 py-1 rounded text-xs text-pink-500 font-bold">🏡 隱私</div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-black text-pink-600 mb-1">尊重隱私</h3>
                        <p class="text-xs text-pink-400 leading-relaxed">請勿在店門口徘徊等待，或私自跟蹤下班後的天使。</p>
                    </div>
                </div>

                <!-- 規則 2 -->
                <div class="rule-card">
                    <div class="rule-img-container">
                        <img src="https://raw.githubusercontent.com/shuang0414/-/2f348d84ab1a7bba922ac132de328634e628fb81/Gemini_Generated_Image_gsmrkdgsmrkdgsmr.png" alt="嚴禁觸摸">
                        <div class="absolute bottom-2 right-2 bg-white/80 px-2 py-1 rounded text-xs text-pink-500 font-bold">🚫 觸摸</div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-black text-pink-600 mb-1">嚴禁觸摸</h3>
                        <p class="text-xs text-pink-400 leading-relaxed">嚴禁碰觸天使的身體、頭髮、甚至服裝配件。</p>
                    </div>
                </div>

                <!-- 規則 3 -->
                <div class="rule-card">
                    <div class="rule-img-container">
                        <img src="https://raw.githubusercontent.com/shuang0414/-/2f348d84ab1a7bba922ac132de328634e628fb81/Gemini_Generated_Image_g7aalcg7aalcg7aa.png" alt="肖像保護">
                        <div class="absolute bottom-2 right-2 bg-white/80 px-2 py-1 rounded text-xs text-pink-500 font-bold">📸 肖像</div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-black text-pink-600 mb-1">肖像保護</h3>
                        <p class="text-xs text-pink-400 leading-relaxed">未經許可禁止拍照錄音錄影，請珍惜當下的互動。</p>
                    </div>
                </div>

                <!-- 規則 4 -->
                <div class="rule-card">
                    <div class="rule-img-container">
                        <img src="https://raw.githubusercontent.com/shuang0414/-/2f348d84ab1a7bba922ac132de328634e628fb81/Gemini_Generated_Image_4eftuw4eftuw4eft.png" alt="純粹互動">
                        <div class="absolute bottom-2 right-2 bg-white/80 px-2 py-1 rounded text-xs text-pink-500 font-bold">☕ 互動</div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-black text-pink-600 mb-1">純粹互動</h3>
                        <p class="text-xs text-pink-400 leading-relaxed">嚴禁詢問私訊方式，或提出店外私人約會要求。</p>
                    </div>
                </div>
            </div>

            <div class="text-center">
                <button onclick="startGame()" class="bg-pink-400 hover:bg-pink-500 text-white px-10 py-4 rounded-full font-black text-xl shadow-lg transition-all active:scale-95">
                    我已了解準則，開始實戰考核
                </button>
            </div>
        </div>
    </div>

    <!-- 3. 實戰遊戲 UI -->
    <main id="game-ui" class="hidden min-h-screen w-full flex items-center justify-center p-4 fade-in">
        <div class="maid-card w-full max-w-5xl p-6 md:p-10 flex flex-col md:flex-row gap-8">
            <!-- 左側狀態 -->
            <div class="w-full md:w-72 flex flex-col items-center border-b-4 md:border-b-0 md:border-r-4 border-pink-100 border-dashed pb-8 md:pb-0 md:pr-8">
                <div id="portrait-container" class="w-32 h-32 rounded-full bg-pink-100 mb-4 flex items-center justify-center text-6xl shadow-inner">
                    <span id="portrait">💂</span>
                </div>
                <h2 id="char-name" class="text-2xl font-black text-pink-500 mb-1">區域巡邏中</h2>
                <div class="w-full mt-6 space-y-2">
                    <div class="flex justify-between text-pink-400 font-black text-xs">
                        <span>秩序守護度</span>
                        <span id="score-num">0</span>
                    </div>
                    <div class="moe-bar-container">
                        <div id="progress-bar" class="moe-bar-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- 右側對話與實戰 -->
            <div class="flex-1 flex flex-col">
                <div class="speech-bubble p-6 mb-4 min-h-[120px] flex items-center shadow-sm">
                    <p id="main-text" class="text-lg text-pink-800 font-bold leading-relaxed"></p>
                </div>

                <div id="rule-explanation" class="hidden rule-note p-4 mb-4 fade-in">
                    <div class="flex items-start gap-3">
                        <span class="text-2xl">📖</span>
                        <div>
                            <p class="text-pink-600 font-black text-sm mb-1">【守護者手冊解釋】</p>
                            <p id="rule-text" class="text-pink-500 text-sm italic"></p>
                        </div>
                    </div>
                </div>

                <div id="options-box" class="flex flex-col gap-3"></div>
            </div>
        </div>
    </main>

    <script>
        const scenes = [
            {
                text: "妳正在巡邏，發現一位客人已經在店門口徘徊了半個多小時，每當有女僕下班走出來，他就會刻意湊近觀察。",
                options: [
                    { 
                        t: "上前禮貌提醒，告知請勿在門口留連影響女僕隱私與通行。", 
                        points: 10, 
                        rule: "正確！根據準則：應尊重天使隱私，嚴禁在店門口等待進出或私自攀談。妳的介入保護了她們的空間。" 
                    },
                    { 
                        t: "「他在外面是他的自由，只要沒進店騷擾就沒關係。」", 
                        points: -5, 
                        rule: "不妥。準則明確禁止在門口逗留，這會造成天使極大的心理壓力，守護者應主動排除風險。" 
                    }
                ]
            },
            {
                text: "桌邊服務時，客人突然伸手想摸女僕頭上的貓耳髮箍，還說：「這材質看起來很好摸，我確認一下。」",
                options: [
                    { 
                        t: "迅速擋下並告知：「主人請自重，天使身上的配件也是嚴禁觸碰的。」", 
                        points: 10, 
                        rule: "做得好！準則規定：嚴禁觸摸天使身體或任何服裝配件。這是絕對不可跨越的紅線。" 
                    },
                    { 
                        t: "「只是摸配件而已，只要沒碰到身體就先口頭警告就好。」", 
                        points: -10, 
                        rule: "錯誤。服裝配件也是身體界線的一部分，任何未經許可的觸碰皆屬違規。" 
                    }
                ]
            },
            {
                text: "一名熟客私下塞了一張紙條給女僕，上面寫著：「明晚下班有空嗎？我知道一間很棒的餐酒館。」",
                options: [
                    { 
                        t: "收回紙條並提醒客人：店內嚴禁私下約會，如有需要請透過官方平台互動。", 
                        points: 10, 
                        rule: "專業！準則禁止詢問私下聯絡方式或提出私人約會。保護天使不被私下騷擾是妳的責任。" 
                    },
                    { 
                        t: "「那是客人的好意，讓女僕自己決定要不要回覆吧。」", 
                        points: -15, 
                        rule: "嚴重錯誤。女僕受僱於此，妳有責任替她擋掉不合規的私下要求，而非讓她獨自面對。" 
                    }
                ]
            },
            {
                text: "妳注意到一位客人偷偷將手機架在胸前口袋，鏡頭正對著正在跳舞的女僕。",
                options: [
                    { 
                        t: "立即上前制止，並請客人刪除未經許可的錄影檔案。", 
                        points: 10, 
                        rule: "正解！準則規定：未經許可禁止拍照、錄音、錄影。這種隱藏式側拍嚴重侵犯肖像權與工作安全。" 
                    },
                    { 
                        t: "「只要他沒開閃光燈，不要打斷演出，等表演結束再勸導。」", 
                        points: -10, 
                        rule: "危險！偷拍一旦上傳網路將難以收回，必須第一時間制止以守護天使的肖像安全。" 
                    }
                ]
            },
            {
                text: "客人在聊天時，不斷套話詢問女僕：「妳在哪間大學讀書啊？」或「妳平常都搭哪條捷運回家？」",
                options: [
                    { 
                        t: "介入對話並委婉化解：「主人，這裡的天使都來自夢幻邊界，我們不討論現實世界的位置唷！」", 
                        points: 10, 
                        rule: "優秀。尊重隱私包含不刺探個人背景。這類問題往往是跟蹤騷擾的前兆，必須及時轉移話題。" 
                    },
                    { 
                        t: "「這只是普通的社交聊天，不用太大驚小怪。」", 
                        points: -10, 
                        rule: "疏忽。刺探生活範圍已踩到隱私底線，守護者若不提醒，會讓女僕陷入回答與不回答的兩難困境。" 
                    }
                ]
            },
            {
                text: "客人因為想點的限定拍立得售罄，對女僕發脾氣說：「我大老遠跑來還花這麼多錢，妳不給我私下補拍我就不走！」",
                options: [
                    { 
                        t: "站在女僕身前，冷靜告知：「規則是為了每位主人公平而設，請尊重店內規範，不可為難天使。」", 
                        points: 10, 
                        rule: "非常正確！這是典型的情緒勒索。守護者必須成為堅強的護盾，不能因為客人的壓力而讓天使違反準則。" 
                    },
                    { 
                        t: "「為了安撫客人的情緒，悄悄通融一次應該沒關係吧？」", 
                        points: -20, 
                        rule: "大忌！通融一次就會有第二次，這不僅違反純粹互動準則，更會破壞店內的秩序與天使對妳的信任。" 
                    }
                ]
            }
        ];

        let currentIdx = 0, score = 0;

        function showRules() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('rules-screen').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function startGame() {
            document.getElementById('rules-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            loadScene();
        }

        function loadScene() {
            if (currentIdx >= scenes.length) { showEnding(); return; }
            const data = scenes[currentIdx];
            document.getElementById('rule-explanation').classList.add('hidden');
            document.getElementById('options-box').innerHTML = "";
            document.getElementById('main-text').innerText = data.text;
            
            data.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = "option-btn shadow-sm";
                btn.innerText = "✦ " + opt.t;
                btn.onclick = () => selectOption(opt);
                document.getElementById('options-box').appendChild(btn);
            });
        }

        function selectOption(opt) {
            score += opt.points;
            const displayScore = Math.max(0, score);
            document.getElementById('score-num').innerText = displayScore;
            // 總分 60
            document.getElementById('progress-bar').style.width = Math.min(100, (displayScore/60)*100) + "%";
            
            document.getElementById('options-box').innerHTML = "";
            document.getElementById('rule-text').innerText = opt.rule;
            document.getElementById('rule-explanation').classList.remove('hidden');

            const nextBtn = document.createElement('button');
            nextBtn.className = "w-full py-4 mt-4 bg-pink-500 text-white rounded-full font-black shadow-lg hover:bg-pink-600 transition-all";
            nextBtn.innerText = currentIdx === scenes.length - 1 ? "查看最終評價" : "繼續下一個情境";
            nextBtn.onclick = () => { currentIdx++; loadScene(); };
            document.getElementById('options-box').appendChild(nextBtn);
        }

        function showEnding() {
            let rank = "";
            let emoji = "";
            if (score >= 55) { rank = "傳說級守護騎士"; emoji = "🛡️✨"; }
            else if (score >= 40) { rank = "正式邊界衛兵"; emoji = "⚔️"; }
            else { rank = "見習執勤員"; emoji = "📝"; }

            document.getElementById('portrait').innerText = score >= 55 ? "👑" : (score >= 40 ? "🏅" : "⚠️");
            document.getElementById('main-text').innerHTML = `
                <div class="text-center w-full">
                    <p class="text-2xl font-black text-pink-600 mb-2">考核結束！</p>
                    <p class="text-xl text-pink-500 mb-4">妳獲得了「${rank}」稱號 ${emoji}</p>
                    <p class="text-base text-pink-800 font-medium">
                        ${score >= 55 ? "妳的反應完美無缺，所有的天使都能在妳的守護下安心綻放笑容！" : "妳具備基本的守護意識，但在面對高壓情境時仍需更加堅定，不要被客人的情緒左右。"}
                    </p>
                </div>
            `;
            document.getElementById('rule-explanation').classList.add('hidden');
            document.getElementById('options-box').innerHTML = `<button onclick="location.reload()" class="w-full py-4 bg-pink-500 text-white rounded-full font-black shadow-lg">重新自我精進</button>`;
        }
    </script>
</body>
</html>
