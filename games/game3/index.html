<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>揭開夢幻背後的真相 - 融媒體專案互動</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&display=swap');

        :root {
            --maid-pink: #fdf2f8;
            --maid-dark-pink: #db2777;
            --evidence-red: #ff3333;
        }

        body {
            background-color: #080808;
            color: #e5e7eb;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            margin: 0;
            /* 防止行動裝置下拉重新整理 */
            overscroll-behavior-y: contain;
        }

        /* 探照燈遮罩 */
        #spotlight-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            background: black;
            z-index: 100;
            -webkit-mask-image: radial-gradient(circle 120px at var(--x, 50%) var(--y, 50%), transparent 15%, black 85%);
            mask-image: radial-gradient(circle 120px at var(--x, 50%) var(--y, 50%), transparent 15%, black 85%);
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* 讓手機更適合操作，調整遮罩大小 */
        @media (min-width: 768px) {
            #spotlight-mask {
                -webkit-mask-image: radial-gradient(circle 180px at var(--x, 50%) var(--y, 50%), transparent 15%, black 85%);
                mask-image: radial-gradient(circle 180px at var(--x, 50%) var(--y, 50%), transparent 15%, black 85%);
            }
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 重要：防止手機觸控時捲動頁面 */
            touch-action: none;
        }

        /* 角色容器 */
        .character-container {
            position: relative;
            height: 80vh;
            width: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #maid-image {
            height: 100%;
            width: auto;
            object-fit: contain;
            display: block;
            filter: brightness(0.8);
            user-select: none;
            -webkit-user-drag: none;
        }

        .tremble {
            animation: tremble 0.15s infinite;
        }

        @keyframes tremble {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1.5px, -1px); }
            100% { transform: translate(1px, 1px); }
        }

        /* 真相證物組件 */
        .evidence-scene {
            position: absolute;
            z-index: 20;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.8s ease, transform 0.8s ease, z-index 0s;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 200px;
        }

        .evidence-scene.revealed {
            opacity: 1 !important;
            transform: scale(1);
            z-index: 150 !important;
            pointer-events: auto;
        }

        .evidence-card {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid var(--evidence-red);
            padding: 0.8rem;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            animation: pulse-red 2s infinite ease-in-out;
            width: 100%;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); border-color: rgba(255, 0, 0, 0.5); }
            50% { box-shadow: 0 0 35px rgba(255, 0, 0, 0.6); border-color: rgba(255, 0, 0, 1); }
            100% { box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); border-color: rgba(255, 0, 0, 0.5); }
        }

        .evidence-img {
            width: 60px;
            height: auto;
            margin: 0 auto 0.5rem;
        }

        /* 互動熱區 */
        .touch-zone {
            position: absolute;
            z-index: 110;
            /* 手機上增加透明背景以便調試或更好的觸擊感 */
            background: rgba(255,255,255,0);
        }
        
        /* 調整熱區比例，使其在手機上更容易觸發 */
        .zone-shoulder { top: 15%; left: 20%; width: 60%; height: 20%; }
        .zone-hand { top: 40%; left: 30%; width: 40%; height: 20%; }
        .zone-hip { top: 65%; left: 20%; width: 60%; height: 25%; }

        /* 文字私語 */
        .whisper-text {
            position: absolute;
            color: #f472b6;
            font-weight: bold;
            z-index: 160;
            pointer-events: none;
            animation: whisperAnim 2.5s forwards ease-out;
            text-shadow: 0 0 10px black;
            font-size: 1rem;
            white-space: nowrap;
        }

        @keyframes whisperAnim {
            0% { transform: scale(0.8); opacity: 0; }
            20% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1) translateY(-30px); opacity: 0; }
        }

        #start-screen {
            background: white;
            z-index: 400;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            color: #1a1a1a;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .action-btn {
            background: var(--maid-dark-pink);
            color: white;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(219, 39, 119, 0.3);
            border: none;
        }

        #hint-text {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            background: rgba(0,0,0,0.8);
            padding: 8px 20px;
            border-radius: 40px;
            color: #fbcfe8;
            opacity: 0;
            transition: opacity 0.5s;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
            width: 80%;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="spotlight-mask"></div>

<!-- 啟動介面 -->
<div id="start-screen" class="fixed inset-0 m-auto w-[90%] md:w-fit h-fit">
    <div class="max-w-md">
        <h1 class="text-2xl md:text-3xl font-bold mb-4 text-pink-600">揭開夢幻背後的暗影</h1>
        <p class="text-gray-600 mb-6 leading-relaxed text-sm md:text-base">
            身為調查者，請按下方按鈕開始。<br>
            在畫面中移動手指（探照燈）審視女僕，<br>停留片刻以發掘隱藏的真相。
        </p>
        <button class="action-btn" onclick="startInvestigating()">開始蒐證調查</button>
    </div>
</div>

<div id="hint-text">持續搜尋疑點：肩膀、手部、裙擺</div>

<div id="game-container">
    <div class="character-container" id="character">
        
        <img id="maid-image" src="https://raw.githubusercontent.com/weiciao04-022/maid-cafe/bfbfa6f9291e4970b2aa79697b36dc4ce8abb364/games/game3/gemini-2.5-flash-image_Image_Matting-0.png" alt="女僕角色">

        <!-- 1. 肩膀真相 -->
        <div class="evidence-scene" style="top: 10%; left: -20%;" id="ev-shoulder">
            <div class="evidence-card">
                <svg class="evidence-img" viewBox="0 0 24 24" fill="none" stroke="red" stroke-width="1.5">
                    <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0M14 10V4a2 2 0 0 0-2-2M10 10.5V6M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2" />
                    <path d="M12 15 L7 15" stroke="red" />
                </svg>
                <p class="text-red-500 font-bold text-sm text-center">不適的搭肩</p>
                <p class="text-gray-400 text-[10px] mt-1 text-center">來自上級的「職場關心」</p>
            </div>
        </div>
        
        <!-- 2. 手部真相 -->
        <div class="evidence-scene" style="top: 35%; right: -25%;" id="ev-hand">
            <div class="evidence-card" style="border-color: #db2777;">
                <svg class="evidence-img" viewBox="0 0 24 24" fill="none" stroke="#db2777" stroke-width="2">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                    <path d="M12 18h.01" />
                </svg>
                <p class="text-pink-400 text-[10px] font-bold mb-1">狂熱顧客私訊：</p>
                <p class="text-pink-100 text-xs leading-tight italic">「我為你花那麼多錢，怎麼都不理我。」</p>
            </div>
        </div>

        <!-- 3. 裙擺真相 -->
        <div class="evidence-scene" style="bottom: 10%; left: 0%;" id="ev-hip">
            <div class="evidence-card">
                <svg class="evidence-img" viewBox="0 0 24 24" fill="none" stroke="#db2777" stroke-width="2">
                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                    <circle cx="12" cy="12" r="3" fill="red" />
                </svg>
                <p class="text-pink-500 font-bold text-sm text-center">偷拍與監視</p>
                <p class="text-gray-400 text-[10px] mt-1 text-center">被忽視的個人隱私邊界</p>
            </div>
        </div>

        <!-- 互動熱區：使用 pointer 事件 -->
        <div class="touch-zone zone-shoulder" data-part="shoulder"></div>
        <div class="touch-zone zone-hand" data-part="hand"></div>
        <div class="touch-zone zone-hip" data-part="hip"></div>
    </div>
</div>

<!-- 結論層 -->
<div id="conclusion" class="fixed inset-0 bg-black/95 z-[500] hidden items-center justify-center p-8 text-center text-white">
    <div class="max-w-xl">
        <h2 class="text-2xl md:text-3xl font-bold text-pink-500 mb-6">調查報告：隱形的壓迫</h2>
        <p class="text-gray-300 mb-8 text-base md:text-lg leading-relaxed">
            對每一位女僕來說，這些都是必須獨自承受的職場陰影。當工作環境沒有清楚的界線，那些無從閃避的侵犯，就會悄悄滲進日常，成為她們在精心打扮之下，最真實也最難言說的困境。
        </p>
        <button class="action-btn text-sm" onclick="location.reload()">重新調查</button>
        <p class="text-zinc-500 text-xs italic mt-6">請繼續向下閱讀報導全文</p>
    </div>
</div>

<script>
    let audioCtx, oscillator, gainNode;
    let examinationProgress = { shoulder: 0, hand: 0, hip: 0 };
    let isExaming = false;
    let currentPart = '';
    let found = { shoulder: false, hand: false, hip: false };

    const whispers = {
        shoulder: ["「肩膀怎麼在抖呢？」", "「聽話才有班排喔...」"],
        hand: ["「笑容是我買下的。」", "「不准不回訊息。」"],
        hip: ["「拍一下又不會怎樣。」", "「我會一直盯著妳。」"]
    };

    const mask = document.getElementById('spotlight-mask');
    const container = document.getElementById('game-container');

    function startInvestigating() {
        document.getElementById('start-screen').style.display = 'none';
        mask.style.opacity = '1';
        document.getElementById('hint-text').style.opacity = '1';
        initAudio();
    }

    // 更新探照燈位置 (支援滑鼠與觸控)
    function updateSpotlight(x, y) {
        document.documentElement.style.setProperty('--x', x + 'px');
        document.documentElement.style.setProperty('--y', y + 'px');
    }

    // 全局 Pointer 事件監聽，確保探照燈跟隨
    window.addEventListener('pointermove', e => {
        updateSpotlight(e.clientX, e.clientY);
    });

    // 針對每個熱區設置 Pointer 事件
    document.querySelectorAll('.touch-zone').forEach(zone => {
        const part = zone.getAttribute('data-part');

        zone.addEventListener('pointerenter', () => examineMaid(part));
        zone.addEventListener('pointerleave', () => stopExamine());
        
        // 對於觸控設備，有時 pointerleave 不穩定，補強觸控點檢測
        zone.addEventListener('touchstart', (e) => {
            // 防止默認行為
            examineMaid(part);
        });
        zone.addEventListener('touchend', () => stopExamine());
    });

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            oscillator = audioCtx.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(45, audioCtx.currentTime); 
            oscillator.connect(gainNode);
            oscillator.start();
        }
    }

    function examineMaid(part) {
        if (found[part]) return;
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        
        isExaming = true;
        currentPart = part;
        document.getElementById('character').classList.add('tremble');
        
        if (gainNode) {
            gainNode.gain.setTargetAtTime(0.3, audioCtx.currentTime, 0.2);
        }
        
        const interval = setInterval(() => {
            if (!isExaming || currentPart !== part || found[part]) {
                clearInterval(interval);
                return;
            }
            
            examinationProgress[part] += 2.0; // 調整解鎖速度，讓手機體驗快一點
            
            // 隨機觸發私語
            if (Math.floor(examinationProgress[part]) % 30 === 15) {
                showWhisper(whispers[part][Math.floor(Math.random() * whispers[part].length)]);
            }

            if (examinationProgress[part] >= 100) {
                revealEvidence(part);
                clearInterval(interval);
                stopExamine();
            }
        }, 50);
    }

    function stopExamine() {
        isExaming = false;
        currentPart = '';
        document.getElementById('character').classList.remove('tremble');
        if (gainNode) {
            gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
        }
    }

    function revealEvidence(part) {
        found[part] = true;
        const ev = document.getElementById(`ev-${part}`);
        if (ev) {
            ev.classList.add('revealed');
        }
        
        // 檢查是否全部蒐集完成
        if (Object.values(found).every(v => v)) {
            document.getElementById('hint-text').innerText = "真相已顯現。";
            setTimeout(() => {
                const conclusion = document.getElementById('conclusion');
                conclusion.classList.remove('hidden');
                conclusion.style.display = 'flex';
            }, 2500);
        }
    }

    function showWhisper(text) {
        const div = document.createElement('div');
        div.className = 'whisper-text';
        div.innerText = text;
        // 在探照燈附近隨機出現
        const x = parseFloat(document.documentElement.style.getPropertyValue('--x')) || window.innerWidth / 2;
        const y = parseFloat(document.documentElement.style.getPropertyValue('--y')) || window.innerHeight / 2;
        
        div.style.left = (x - 50) + 'px';
        div.style.top = (y - 50) + 'px';
        
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
    }
</script>

</body>
</html>
