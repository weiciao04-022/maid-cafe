<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>女僕咖啡廳互動故事</title>
  <meta name="description" content="女僕咖啡廳主題 longform 網頁，完成每段小遊戲後才能繼續閱讀。" />
  <style>
    :root {
      --bg: #fff7fb;
      --bg-soft: #fff;
      --text: #4a3340;
      --muted: #7b5b69;
      --accent: #ff6fa3;
      --accent-2: #7ad5ff;
      --line: rgba(255, 111, 163, 0.26);
      --shadow: 0 18px 40px rgba(181, 101, 136, 0.2);
      --radius: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 100%; }

    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 600px at 5% -10%, #ffd8e8 0%, transparent 40%),
        radial-gradient(900px 700px at 100% 5%, #dff7ff 0%, transparent 45%),
        var(--bg);
      overflow-x: hidden;
    }

    section {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(1rem, 4vw, 3rem);
      border-bottom: 2px dashed var(--line);
    }

    .hero {
      text-align: center;
      gap: 1rem;
    }

    .hero-card {
      width: min(900px, 100%);
      background: linear-gradient(160deg, #fff, #fff7fc);
      border-radius: var(--radius);
      border: 2px solid #ffd7e9;
      box-shadow: var(--shadow);
      padding: clamp(1.5rem, 4vw, 3rem);
      display: grid;
      gap: 0.9rem;
    }

    .badge {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 700;
    }

    h1 { font-size: clamp(2rem, 5vw, 4rem); line-height: 1.2; }
    h2 { font-size: clamp(1.4rem, 3vw, 2.1rem); margin-bottom: 0.8rem; }
    p { color: var(--muted); font-size: clamp(1rem, 1.4vw, 1.2rem); line-height: 1.75; }

    .game-wrap { width: min(1200px, 100%); display: grid; gap: 0.75rem; }

    .game-frame {
      width: 100%;
      height: min(88vh, 860px);
      border-radius: var(--radius);
      overflow: hidden;
      border: 2px solid #ffd2e5;
      box-shadow: var(--shadow);
      background: var(--bg-soft);
    }

    iframe { width: 100%; height: 100%; border: 0; display: block; }

    .text-card {
      width: min(860px, 100%);
      background: #fff;
      border-radius: var(--radius);
      border: 2px solid #ffd7e9;
      box-shadow: var(--shadow);
      padding: clamp(1.4rem, 4vw, 2.6rem);
      display: grid;
      gap: 0.8rem;
    }

    .lock-tip {
      color: #b64c78;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .gate {
      position: fixed;
      left: 50%;
      bottom: 1rem;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid #ffb9d3;
      border-radius: 999px;
      padding: 0.5rem 1rem;
      font-size: 0.92rem;
      color: #9f426b;
      box-shadow: 0 8px 20px rgba(255, 111, 163, 0.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
      z-index: 60;
    }

    .gate.show { opacity: 1; }
  </style>
</head>
<body>
  <main>
    <section class="hero" data-locked-after="0">
      <div class="hero-card">
        <span class="badge">Maid Cafe Story</span>
        <h1>歡迎回家，主人 ♡</h1>
        <p>請先完成每一段的互動問答，再往下閱讀故事。今天的特製甜點，需要你一步步解鎖！</p>
      </div>
    </section>

    <section class="game-section" id="game-1" data-game-order="1">
      <div class="game-wrap">
        <p class="lock-tip">完成這題後才可繼續往下滑閱讀後續內容。</p>
        <div class="game-frame"><iframe src="games/game1/index.html" title="1+1 問答"></iframe></div>
      </div>
    </section>

    <section class="text-section" data-locked-after="1">
      <article class="text-card">
        <h2>文字一</h2>
        <p>11111111111111111111111111</p>
      </article>
    </section>

    <section class="game-section" id="game-2" data-game-order="2">
      <div class="game-wrap">
        <p class="lock-tip">請先完成這題，故事才會繼續。</p>
        <div class="game-frame"><iframe src="games/game2/index.html" title="2+2 問答"></iframe></div>
      </div>
    </section>

    <section class="text-section" data-locked-after="2">
      <article class="text-card">
        <h2>文字二</h2>
        <p>22222222222222222</p>
      </article>
    </section>

    <section class="game-section" id="game-3" data-game-order="3">
      <div class="game-wrap">
        <p class="lock-tip">完成最後一題就會解鎖全文。</p>
        <div class="game-frame"><iframe src="games/game3/index.html" title="3+3 問答"></iframe></div>
      </div>
    </section>

    <section class="text-section" data-locked-after="3">
      <article class="text-card">
        <h2>恭喜通關，主人辛苦了！</h2>
        <p>你成功完成今天的三道任務，女僕咖啡廳的隱藏章節也為你開啟。歡迎下次再回來，我們會準備新的互動故事與特製甜點等你挑戰！</p>
      </article>
    </section>
  </main>

  <div id="gateHint" class="gate">請先完成目前的遊戲，才能繼續往下閱讀。</div>

  <script>
    (() => {
      const completed = new Set();
      const totalGames = 3;
      const gameSections = [...document.querySelectorAll('[data-game-order]')];
      const gateHint = document.getElementById('gateHint');
      let gateTimeout;

      function maxUnlockedGameOrder() {
        let order = 0;
        while (completed.has(order + 1)) order += 1;
        return order;
      }

      function gatePositionY() {
        const order = maxUnlockedGameOrder();
        if (order >= totalGames) return Number.POSITIVE_INFINITY;
        const nextGame = gameSections.find((s) => Number(s.dataset.gameOrder) === order + 1);
        return nextGame ? nextGame.offsetTop + 16 : Number.POSITIVE_INFINITY;
      }

      function showHint() {
        gateHint.classList.add('show');
        clearTimeout(gateTimeout);
        gateTimeout = setTimeout(() => gateHint.classList.remove('show'), 1200);
      }

      function enforceGate() {
        const y = gatePositionY();
        if (window.scrollY > y) {
          window.scrollTo({ top: y, behavior: 'smooth' });
          showHint();
        }
      }

      window.addEventListener('scroll', enforceGate, { passive: true });
      window.addEventListener('resize', enforceGate);

      window.addEventListener('message', (event) => {
        if (!event.data || event.data.type !== 'game-complete') return;
        const game = Number(event.data.game);
        if (!Number.isFinite(game)) return;
        completed.add(game);
        gateHint.classList.remove('show');
      });
    })();
  </script>
</body>
</html>
